*{box-sizing:border-box;margin:0;padding:0}
:root{--b:#3D3DB5;--bd:#2B2B8A;--bl:#EBEBFF;--p:#E5007D;--g:#72B81E;--gd:#4A8010;--gl:#EAF5D0;--gray:#F5F5FA;--bdr:#E0E0EF;--txt:#1A1A3E;--mut:#7070A0}
body{font-family:system-ui,sans-serif;font-size:14px;color:var(--txt);background:var(--gray)}
.app{display:flex;flex-direction:column;min-height:100vh}
.top{background:var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logi{width:36px;height:36px;border-radius:50%;background:white;overflow:hidden;padding:2px;flex-shrink:0}
.logi img{width:100%;height:100%;object-fit:contain}
.brand{font-size:17px;font-weight:800;letter-spacing:1.5px;color:white}
.brand b{color:#E5007D}
.brand small{display:block;font-size:9px;letter-spacing:.5px;color:rgba(255,255,255,.4);font-weight:400}
.top-r{margin-left:auto;display:flex;align-items:center;gap:7px}
.sdot{width:8px;height:8px;border-radius:50%;background:#aaa;display:inline-block;cursor:pointer;flex-shrink:0}
.sok{background:#72B81E}.serr{background:#E53935}.sbsy{background:#FB8C00;animation:p .8s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.chip{background:#E5007D;color:white;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.bge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
.bga{background:#72B81E;color:white}.bgl{background:#FB8C00;color:white}
.tabs{background:var(--b);display:flex;overflow-x:auto;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.5);border-bottom:2.5px solid transparent;white-space:nowrap}
.tab.on{color:white;border-bottom-color:#E5007D;background:rgba(255,255,255,.08)}
.pg{padding:1rem;flex:1}
.card{background:white;border:1px solid var(--bdr);border-radius:12px;padding:1rem;margin-bottom:.75rem}
.shd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;flex-wrap:wrap;gap:8px}
.g4{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:.75rem}
@media(min-width:480px){.g4{grid-template-columns:repeat(4,1fr)}}
.kc{background:white;border:1px solid var(--bdr);border-radius:10px;padding:11px 12px;position:relative;overflow:hidden}
.ka{position:absolute;top:0;left:0;width:3px;height:100%}
.kl{font-size:11px;color:var(--mut);margin-bottom:3px}
.kv{font-size:24px;font-weight:800;line-height:1}
.btn{padding:7px 13px;border-radius:8px;border:1px solid var(--bdr);background:white;color:var(--txt);font-size:13px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.btn:active{transform:scale(.97)}
.btnb{background:var(--b);color:white;border-color:var(--b)}
.btnp{background:#E5007D;color:white;border-color:#E5007D}
.btng{background:var(--g);color:white;border-color:var(--g)}
.btno{background:#FB8C00;color:white;border-color:#FB8C00}
.bsm{padding:6px 12px;font-size:12px}.bxs{padding:3px 8px;font-size:11px}
.or{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:9px 11px;border:1px solid var(--bdr);border-radius:9px;margin-bottom:6px;background:white}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.tag-ap{background:#E3F2FD;color:#1565C0}.tag-pr{background:var(--bl);color:var(--b)}
.tag-ec{background:#E8F5E9;color:#2E7D32}.tag-re{background:#FFF3E0;color:#E65100}
.tag-an{background:#F5F5F5;color:#9E9E9E}.tag-lv{background:var(--gl);color:var(--gd)}
.pri-n{background:#F5F5F5;color:#7070A0}.pri-i{background:#FFF8E1;color:#F57F17}
.pri-c{background:#FFEBEE;color:#C62828}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px;margin-bottom:9px}
.fg label{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{padding:8px 11px;border:1px solid var(--bdr);border-radius:8px;background:white;color:var(--txt);font-size:14px;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--b);box-shadow:0 0 0 3px rgba(61,61,181,.08)}
.frow{display:flex;gap:8px;flex-wrap:wrap}
.ovl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(27,27,90,.5);display:none;align-items:flex-end;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.ovl.show{display:flex}

.mtl{font-size:15px;font-weight:800;color:var(--b);margin-bottom:1rem}
.acw{position:relative}
.acd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1px solid var(--bdr);border-radius:10px;max-height:200px;overflow-y:auto;z-index:200;box-shadow:0 8px 24px rgba(61,61,181,.15);display:none}

function fbSave(cb){
  if(!FB_URL){sv();if(cb)cb();return;}
  sstatus="bsy";rsd();
  fetch(FB_URL+"/odelys.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({cmds:CMDS,n:N,cl:CL,lv:LV,ts:Date.now()})})
    .then(function(){sstatus="ok";sv();rsd();if(cb)cb();})
    .catch(function(){sstatus="err";sv();rsd();if(cb)cb();});
}
// Normalize date "9/4/2026" -> "09/04/2026"
function normDate(s){
  if(!s||typeof s!=="string")return s||"";
  var p=s.split("/");
  if(p.length!==3)return s;
  return p[0].padStart(2,"0")+"/"+p[1].padStart(2,"0")+"/"+p[2];
}
function normCmds(cmds){
  if(!cmds)return cmds;
  return cmds.map(function(c){
    c.dc=normDate(c.dc);
    c.dls=normDate(c.dls);
    c.dl=normDate(c.dl);
    return c;
  });
}
function fbLoad(cb){
  if(!FB_URL){ld();if(cb)cb();return;}
  sstatus="bsy";rsd();
  fetch(FB_URL+"/odelys.json")
    .then(function(r){return r.json();})
    .then(function(d){
      var fbHasData=d&&d.cmds&&d.cmds.length>0;
      var localHasData=CMDS&&CMDS.length>0;
      if(fbHasData&&(!localHasData||d.cmds.length>=CMDS.length)){
        CMDS=normCmds(d.cmds);N=d.n||N;
        if(d.cl&&d.cl.length>10)CL=d.cl;
        if(d.lv&&d.lv.length>0)LV=d.lv;
        sstatus="ok";sv();rsd();if(cb)cb();
      } else if(localHasData){
        sstatus="ok";rsd();
        fbSave(cb);
      } else {
        sstatus="ok";rsd();if(cb)cb();
      }
    })
    .catch(function(){sstatus="err";rsd();if(cb)cb();});
}
function rsd(){var d=document.getElementById("sdot");if(d){d.className="sdot s"+sstatus;}}
function startSync(){if(SS)clearInterval(SS);if(!FB_URL)return;SS=setInterval(function(){fbLoad(function(){if(MODE!=="login")render();});},SYNC_IV);}

function sv(){try{localStorage.setItem("ody5",JSON.stringify({c:CMDS,n:N,cl:CL,lv:LV,fb:FB_URL,gas:GAS_URL}));}catch(e){}}
function ld(){
  // Try current key first, then fallback to older versions
  var keys=["ody5","ody4","ody3","ody2"];
  for(var k=0;k<keys.length;k++){
    try{
      var d=JSON.parse(localStorage.getItem(keys[k])||"null");
      if(!d)continue;
      if(d.c&&d.c.length>0)CMDS=d.c;
      if(d.n&&d.n>1000)N=d.n;
      if(d.cl&&d.cl.length>10)CL=d.cl;
      if(d.lv&&d.lv.length>0)LV=d.lv;
      if(d.fb&&!FB_URL)FB_URL=d.fb;if(d.gas)GAS_URL=d.gas;
      if(d.c&&d.c.length>0){
        CMDS=normCmds(CMDS);
        sv();
        break;
      }
    }catch(e){}
  }
}

function td(){
  var d=new Date();
  var day=String(d.getDate()).padStart(2,"0");
  var mon=String(d.getMonth()+1).padStart(2,"0");
  return day+"/"+mon+"/"+d.getFullYear();
}
function tdiso(){return new Date().toISOString().split("T")[0];}
function nid(){return "CMD-"+(++N).toString().padStart(4,"0");}
function ini(n){return n.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase();}
function lcolor(id){var i=LV.findIndex(function(l){return l.id===id;});return DC[i<0?0:i%DC.length];}
function lname(id){var l=LV.find(function(l){return l.id===id;});return l?l.n:"?";}
function capUsed(lid){
  var l=LV.find(function(x){return x.id===lid;});
  if(!l)return 0;
  var cs=CMDS.filter(function(c){
    return c.lid===lid&&c.s!=="Annulee"&&c.s!=="Livree";
  });
  if(!cs.length)return 0;
  // Find load of current (first incomplete) circuit
  var load=0,circuitLoad=0;
  for(var i=0;i<cs.length;i++){
    load+=(+cs[i].q||0);
    // If this circuit is full, start a new one
    if(load>l.cap){
      // New circuit started - reset to current command load
      load=(+cs[i].q||0);
    }
    circuitLoad=load;
  }
  return circuitLoad; // load of current circuit
}
function parseDate(s){
  if(!s)return null;
  var p=s.split("/");
  if(p.length!==3)return null;
  return new Date(p[2]+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0")+"T12:00:00");
}
function livCmds(lid){
  var today=parseDate(td());
  return CMDS.filter(function(c){
    if(c.lid!==lid||c.s==="Annulee"||c.s==="Livree")return false;
    // If has a planned delivery date (dls), show only if dls <= today
    if(c.dls){
      var dls=parseDate(c.dls);
      if(dls&&dls>today)return false; // not yet due
    }
    return true; // show: no date set, or date is today/past
  }).sort(function(a,b){
    // Sort by manual order if set, else by creation date
    if(a.ord!==undefined&&b.ord!==undefined)return a.ord-b.ord;
    var da=parseDate(a.dls||a.dc),db=parseDate(b.dls||b.dc);
    if(da&&db)return da-db;
    return 0;
  });
}

function getCircuits(lid){
  var l=LV.find(function(x){return x.id===lid;});if(!l)return[];
  var cs=livCmds(lid).filter(function(c){return c.s!=="Livree"&&c.s!=="Annulee";});
  if(!cs.length)return[];
  var cirs=[],cur=[],load=0;
  cs.forEach(function(c){
    if(load+(+c.q||0)>l.cap&&cur.length){cirs.push(cur);cur=[];load=0;}
    cur.push(c);load+=(+c.q||0);
  });
  if(cur.length)cirs.push(cur);
  return cirs;
}
// Nearest-neighbor optimization
function optimizeStops(stops){
  if(stops.length<=2)return stops;
  var depot=[36.685984,2.89];
  var withC=[],withoutC=[];
  stops.forEach(function(s){var co=getCoords(s);if(co)withC.push({s:s,co:co});else withoutC.push(s);});
  if(withC.length<=1)return stops;
  var result=[],remaining=withC.slice(),cur=depot;
  while(remaining.length>0){
    var best=0,bestD=Infinity;
    remaining.forEach(function(x,i){
      var d=Math.pow(x.co[0]-cur[0],2)+Math.pow(x.co[1]-cur[1],2);
      if(d<bestD){bestD=d;best=i;}
    });
    result.push(remaining[best].s);
    cur=remaining[best].co;
    remaining.splice(best,1);
  }
  return result.concat(withoutC);
}
function openMaps(stops){
  if(!stops.length)return;
  var optimized=optimizeStops(stops);
  var url="https://www.google.com/maps/dir/"+encodeURIComponent(DEPOT_ADDR);
  optimized.slice(0,23).forEach(function(c){url+="/"+encodeURIComponent(c.a+", "+c.c+", "+c.w+", Algerie");});
  url+="/"+encodeURIComponent(DEPOT_ADDR);
  window.open(url,"_blank");
}

function openFbConfig(){
  var html='<div class="mbar"></div><div class="mtl">Configuration Firebase</div>'
    +'<div class="al al-i" style="font-size:12px"><b>Pourquoi Firebase ?</b> Sans Firebase, les donnees restent sur votre appareil uniquement. Les livreurs ne verront rien sur leur telephone.<br><br>'

    +'1. Allez sur <b>console.firebase.google.com</b><br>'
    +'2. Cliquez "Commencer par configurer un projet" &rarr; Nom: <b>odelys</b><br>'
    +'3. Menu gauche: <b>Build &rarr; Realtime Database</b><br>'
    +'4. Cliquez <b>Create Database</b> &rarr; Start in test mode &rarr; Enable<br>'
    +'5. Copiez l\'URL affichee (ex: https://odelys-abc-default-rtdb.europe-west1.firebasedatabase.app)<br>'
    +'6. Collez-la ci-dessous et cliquez Enregistrer</div>'
    +'<div class="fg" style="margin-top:1rem"><label>URL Firebase Realtime Database</label>'
    +'<input id="fburl" value="'+FB_URL+'" placeholder="https://odelys-...-default-rtdb.....firebasedatabase.app" style="font-size:12px"></div>'
    +'<div style="display:flex;gap:8px;margin-top:4px">'
    +'<button data-a="cov" style="flex:1;padding:10px;border:1px solid var(--bdr);background:white;border-radius:8px;cursor:pointer;font-weight:600">Annuler</button>'
    +'<button data-a="sfb" class="btn btnb" style="flex:2;padding:10px">Enregistrer</button>'
    +'</div>';
  document.getElementById("mdc").innerHTML=html;
  document.getElementById("ov").classList.add("show");
}
function saveFbConfig(){
  var u=(document.getElementById("fburl").value||"").trim().replace(/\/$/,"");
  FB_URL=u;sv();closeOv();
  if(FB_URL){fbLoad(function(){render();startSync();alert("Firebase configure! Synchronisation en cours...");});}
  else render();
}

// ═══ DASHBOARD ════════════════════════════════════
function pgDB(){
  var tc=CMDS.filter(function(c){return c.dc===td();});
  var lv=CMDS.filter(function(c){return c.s==="Livree"||c.s==="Annulee";}).sort(function(a,b){
    var da=parseDate(a.dl||a.dc), db=parseDate(b.dl||b.dc);
    if(da&&db)return db-da;
    return 0;
  });
  var livrees=lv.filter(function(c){return c.s==="Livree";});
  var annulees=lv.filter(function(c){return c.s==="Annulee";});
  var at=tc.filter(function(c){return c.s==="A programmer"||c.s==="Programmee";});
  var tq=tc.reduce(function(s,c){return s+(+c.q||0);},0);
  var lq=livrees.reduce(function(s,c){return s+(+c.qr||+c.q||0);},0);
  var vt=tc.reduce(function(s,c){return s+(+c.vi||0);},0);
  var h='<div class="shd"><b style="color:var(--b)">Dashboard — '+new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long"})+'</b>'
    +'<button class="btn btnp bsm" data-a="new-cmd">+ Commande</button></div>';
  if(!FB_URL) h+='<div class="al al-r" style="font-size:12px">⚠ Firebase non configure — les livreurs ne voient pas les commandes. <span style="cursor:pointer;text-decoration:underline;font-weight:700" data-a="fbc">Configurer</span></div>';
  h+='<div class="g4">'
    +'<div class="kc"><div class="ka" style="background:var(--b)"></div><div class="kl">Commandees</div><div class="kv" style="color:var(--b)">'+tq+'</div><div style="font-size:10px;color:var(--mut)">'+tc.length+' cmd</div></div>'
    +'<div class="kc"><div class="ka" style="background:var(--g)"></div><div class="kl">Livrees</div><div class="kv" style="color:var(--gd)">'+lq+'</div></div>'
    +'<div class="kc"><div class="ka" style="background:#854F0B"></div><div class="kl">Vides recup.</div><div class="kv" style="color:#854F0B">'+vt+'</div></div>'
    +'<div class="kc"><div class="ka" style="background:#E5007D"></div><div class="kl">En attente</div><div class="kv" style="color:#E5007D">'+at.length+'</div></div>'
    +'</div>';
  if(lv.length===tc.length&&tc.length>0) h+='<div class="al al-ok">Toutes les livraisons terminees !</div>';
  h+='<div class="shd" style="margin-top:.5rem"><b style="color:var(--b)">Livreurs du jour</b><button class="btn bsm" data-a="tab" data-tab="aff">Affectation</button></div>';
  var any=false;
  LV.forEach(function(l,i){
    var cs=livCmds(l.id);if(!cs.length)return;any=true;
    var u=cs.reduce(function(s,c){return s+(+c.q||0);},0);
    var pct=Math.min(100,Math.round(u/l.cap*100));
    var col=DC[i%DC.length],bc=pct>90?"#E53935":pct>70?"#FB8C00":"#72B81E";
    var llv=cs.filter(function(c){return c.s==="Livree";});
    var cirs=getCircuits(l.id);
    h+='<div class="card" style="margin-bottom:.5rem">'
      +'<div style="display:flex;align-items:center;gap:9px">'

function pgCMD(){
  var tc=CMDS.filter(function(c){return c.s!=="Livree"||c.dc===td();});
  tc.sort(function(a,b){
    // Future commands at bottom
    var af=a.dls&&parseDate(a.dls)>parseDate(td())?1:0;
    var bf=b.dls&&parseDate(b.dls)>parseDate(td())?1:0;
    if(af!==bf)return af-bf;
    var po={"Critique":0,"Importante":1,"Normale":2};
    return (po[a.pri||"Normale"]||0)-(po[b.pri||"Normale"]||0);
  });
  var h='<div class="shd"><b style="color:var(--b)">Commandes du jour</b><button class="btn btnp" data-a="new-cmd">+ Nouvelle</button></div>';
  if(!tc.length) return h+'<div class="em">Aucune commande.</div>';
  tc.sort(function(a,b){var po={"Critique":0,"Importante":1,"Normale":2};return (po[a.pri||"Normale"]||0)-(po[b.pri||"Normale"]||0);});
  tc.forEach(function(c){
    h+='<div class="or" style="'+(c.pri==="Critique"?"border-color:#E53935":c.pri==="Importante"?"border-color:#FB8C00":"")+'">'
      +'<div style="font-size:10px;color:var(--mut);font-weight:600;min-width:68px">'+c.id+'</div>'
      +'<div style="flex:1;min-width:120px"><div style="font-weight:700">'+c.cn+'</div>'
      +'<div style="font-size:11px;color:var(--mut)">'+c.c+' &mdash; '+c.w+'</div>'
      +(c.dls?'<div style="font-size:11px;color:'+(parseDate(c.dls)>parseDate(td())?'#1565C0':'var(--gd)')+'">📅 '+(parseDate(c.dls)>parseDate(td())?'Prévue le ':'Dû le ')+c.dls+'</div>':'')
      +(c.note?'<div style="font-size:11px;color:#7B1FA2">📌 '+c.note+'</div>':'')
      +(c.rem?'<div style="font-size:11px;color:#854F0B">💬 '+c.rem+'</div>':'')
      +'</div>'
      +'<b style="color:var(--gd)">'+c.q+'</b>'
      +'<div style="font-size:11px">'+(c.lid?'<span style="color:'+lcolor(c.lid)+';font-weight:700">'+lname(c.lid)+'</span>':'<span style="color:#E53935">—</span>')+'</div>'
      +stTag(c.s||"A programmer")+priTag(c.pri||"Normale")

      +'<button data-a="del-cmd" data-id="'+c.id+'" style="padding:3px 8px;font-size:11px;border:1px solid #FFCDD2;border-radius:6px;cursor:pointer;background:white;color:#C62828">🗑</button>'
      +'</div>';

function pgAFF(){
  var today2=parseDate(td());

  // Commandes affectables : dls <= aujourd'hui OU pas de dls
  var na=CMDS.filter(function(c){
    if(c.lid||c.s==="Annulee"||c.s==="Livree")return false;
    var d=c.dls?parseDate(c.dls):null;
    return !d||d<=today2;
  });

  // Commandes futures non affectées
  var future=CMDS.filter(function(c){
    if(c.lid||c.s==="Annulee"||c.s==="Livree")return false;
    var d=c.dls?parseDate(c.dls):null;
    return d&&d>today2;
  });

  var h='<b style="color:var(--b);display:block;margin-bottom:.875rem">Affectation des tournees</b>';

  // ── Non affectées groupées par commune ─────────────
  if(na.length){
    // Grouper par commune
    var byC={};
    na.forEach(function(c){var k=c.c||c.w||"Autre";if(!byC[k])byC[k]=[];byC[k].push(c);});
    var communes=Object.keys(byC).sort(function(a,b){
      return byC[b].reduce(function(s,c){return s+(+c.q||0);},0)
            -byC[a].reduce(function(s,c){return s+(+c.q||0);},0);
    });
    h+='<div class="al al-i" style="font-size:12px">📍 Groupées par zone géographique — Cliquez sur un livreur pour affecter toute une commune</div>';
    communes.forEach(function(com){
      var cs=byC[com];
      var tot=cs.reduce(function(s,c){return s+(+c.q||0);},0);
      h+='<div class="cgrp">'
        +'<div class="cgrp-hd">'
        +'<span>📍</span>'
        +'<span style="font-weight:700;flex:1">'+com+'</span>'
        +'<span class="tag tag-ap">'+cs.length+' cmd — '+tot+' bonb.</span>'
        +'</div>'
        +'<div class="cgrp-bd">'
        // Boutons livreurs pour "Affecter tout"
        +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center">'
        +'<span style="font-size:11px;color:var(--mut);font-weight:600">Affecter tout :</span>';
      LV.forEach(function(l,i){
        var d=l.cap-capUsed(l.id);
        var col=DC[i%DC.length];
        h+='<button class="btn bxs" data-a="afc" data-grp="'+com+'" data-liv="'+l.id+'"'
          +' style="background:'+col+'22;color:'+col+';border-color:'+col+'66;font-size:11px">'+l.n+' ('+d+')</button>';
      });
      h+='</div>';
      // Lignes individuelles
      cs.forEach(function(c){
        var lo="<option value=''>— livreur —</option>";
        LV.forEach(function(l){lo+='<option value="'+l.id+'">'+l.n+'</option>';});
        h+='<div class="or" style="margin-bottom:4px">'
          +'<div style="flex:1"><b style="font-size:12px">'+c.cn+'</b> '+priTag(c.pri||"Normale")
          +(c.dls?'<span style="font-size:10px;color:var(--gd);margin-left:4px">📅 '+c.dls+'</span>':'')
          +'<div style="font-size:10px;color:var(--mut)">'+c.a.substring(0,42)+'</div></div>'
          +'<b style="color:var(--gd)">'+c.q+'</b>'
          +'<select data-a="aff" data-id="'+c.id+'" style="width:120px;font-size:12px;padding:5px">'+lo+'</select>'
          +'</div>';
      });
      h+='</div></div>';
    });
  } else {
    h+='<div class="al al-ok">Toutes les commandes du jour sont affectées !</div>';
  }

  // ── Commandes futures ──────────────────────────────
  if(future.length){
    h+='<div class="card" style="border-color:#3D3DB5;margin-top:.5rem">'
      +'<div style="font-size:12px;font-weight:700;color:#3D3DB5;margin-bottom:8px">📅 À venir — '+future.length+' commande(s) (modifier la date pour affecter)</div>';
    future.forEach(function(c){
      h+='<div class="or" style="background:#F0F4FF;margin-bottom:4px">'
        +'<div style="flex:1"><b style="font-size:12px">'+c.cn+'</b>'
        +'<span style="font-size:10px;color:#3D3DB5;font-weight:700;margin-left:6px">📅 '+c.dls+'</span>'
        +'<div style="font-size:10px;color:var(--mut)">'+c.c+'</div></div>'
        +'<b style="color:var(--gd)">'+c.q+'</b>'+priTag(c.pri||"Normale")
        +'<button data-a="edit-cmd" data-id="'+c.id+'" class="btn bxs" style="font-size:11px">✏ Modifier</button>'
        +'</div>';
    });
    h+='</div>';
  }

  // ── Par livreur avec circuits Google Maps ──────────
  LV.forEach(function(l,i){
    var cs=livCmds(l.id);
    var u=cs.reduce(function(s,c){return s+(+c.q||0);},0);
    var pct=Math.min(100,Math.round(u/l.cap*100));
    var col=DC[i%DC.length],bc=pct>90?"#E53935":pct>70?"#FB8C00":col;
    var cirs=getCircuits(l.id);
    h+='<div class="card"><div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">'
      +'<div style="width:34px;height:34px;border-radius:50%;background:'+col+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white">'+ini(l.n)+'</div>'
      +'<div style="flex:1"><div style="font-weight:700;color:'+col+'">'+l.n+' — '+l.v+'</div>'
      +'<div style="font-size:11px;color:var(--mut)">'+u+'/'+l.cap+' bonb. — '+(cirs.length>1?'<b style="color:#E5007D">'+cirs.length+' circuits</b>':'1 circuit')+'</div>'
      +'<div style="height:3px;background:var(--gray);border-radius:2px;margin-top:3px;overflow:hidden">'
      +'<div style="height:100%;background:'+bc+';width:'+pct+'%"></div></div></div>';
    // Boutons circuits Google Maps
    if(cs.length){
      h+='<div style="display:flex;flex-direction:column;gap:3px">';
      cirs.forEach(function(cir,ci){
        var cload=cir.reduce(function(s,c){return s+(+c.q||0);},0);
        h+='<button class="btn bsm btno" data-a="cir" data-id="'+l.id+'" data-ci="'+ci+'">'
          +'🗺 Circuit opt.'+(ci+1)+' ('+cload+' bonb.) '
          +cir.map(function(x){return x.cn.substring(0,5);}).join(' · ')
          +'</button>';
      });
      h+='</div>';
    }
    h+='</div>';
    cs.forEach(function(c,ci){
      h+='<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--gray);border-radius:7px;margin-bottom:3px;font-size:12px">'
        +'<span style="background:'+col+';color:white;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0">'+(ci+1)+'</span>'
        +'<span style="flex:1;font-weight:600">'+c.cn+'</span>'
        +(c.dls&&c.dls!==td()?'<span style="font-size:10px;color:var(--b)">📅 '+c.dls+'</span>':'')
        +'<span style="color:var(--mut);font-size:10px">'+c.c+'</span>'
        +'<b style="color:var(--gd)">'+c.q+'</b>'+stTag(c.s||"A programmer")
        +'<button data-a="mup" data-id="'+c.id+'" data-lid="'+l.id+'" style="padding:2px 5px;border:1px solid var(--bdr);border-radius:5px;cursor:pointer;background:white" title="Monter">↑</button>'
        +'<button data-a="mdn" data-id="'+c.id+'" data-lid="'+l.id+'" style="padding:2px 5px;border:1px solid var(--bdr);border-radius:5px;cursor:pointer;background:white" title="Descendre">↓</button>'
        +'<button data-a="unaff" data-id="'+c.id+'" style="padding:2px 7px;font-size:11px;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;background:white">x</button>'
        +'</div>';
    });
    if(!cs.length) h+='<div style="font-size:12px;color:var(--mut);text-align:center;padding:5px">Aucune commande</div>';
    h+='</div>';
  });
  return h;
}

  // Delivered commands list - most recent first
  if(lv.length>0){

    lv.forEach(function(c){
      var idx=LV.findIndex(function(l){return l.id===c.lid;});
      var col=c.s==="Annulee"?"#9E9E9E":(c.lid?DC[idx<0?0:idx%DC.length]:"#9E9E9E");
      h+='<div class="or" style="border-left:3px solid '+col+';margin-bottom:4px;'+(c.s==="Annulee"?'opacity:.6;background:#F5F5F5':'')+'">'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-weight:700;font-size:12px">'+c.cn+'</div>'
        +'<div style="font-size:10px;color:var(--mut)">'+c.c+' &mdash; '+(c.dl||c.dc)+'</div>'
        +'</div>'
        +'<div style="text-align:center;min-width:40px"><div style="font-size:16px;font-weight:800;color:var(--gd)">'+(c.qr||c.q)+'</div><div style="font-size:9px;color:var(--mut)">bonb.</div></div>'
        +(c.vi?'<span class="tag tag-pr">'+c.vi+' vides</span>':'')
        +(c.bl?'<span class="tag" style="background:#FFE8F4;color:#E5007D">'+c.bl+'</span>':'')
        +(c.obs?'<span class="tag" style="background:#FFF8E1;color:#F57F17">💬 '+c.obs+'</span>':'')
        +'<span style="font-size:10px;color:'+col+';font-weight:700">'+lname(c.lid)+'</span>'
        +'</div>';
    });
    h+='</div>';
  }
  return h;
}

function filterCL(q){
  var d=document.getElementById("acd");
  if(!q){d.classList.remove("on");d.innerHTML="";return;}
  var res=CL.filter(function(c){return c.n.toLowerCase().indexOf(q.toLowerCase())>=0||(c.c||"").toLowerCase().indexOf(q.toLowerCase())>=0;}).slice(0,10);
  d.innerHTML="";
  if(!res.length){d.innerHTML="<div class='aci' style='color:var(--mut)'>Aucun resultat</div>";d.classList.add("on");return;}
  res.forEach(function(c){
    var el=document.createElement("div");el.className="aci";
    el.innerHTML="<b>"+c.n+"</b><small>"+c.w+" &mdash; "+c.c+"</small>";
    el.onclick=function(){
      document.getElementById("inc").value=c.n;
      document.getElementById("cid").value=c.id;
      document.getElementById("fw").textContent=c.w;
      document.getElementById("fc").textContent=c.c;
      d.classList.remove("on");d.innerHTML="";
    };
    d.appendChild(el);
  });
  d.classList.add("on");
}

function getCoords(c){
  if(!c)return null;
  // Try exact commune match
  if(COMMUNE_COORDS[c.c])return COMMUNE_COORDS[c.c];
  // Try wilaya capital
  if(COMMUNE_COORDS[c.w])return COMMUNE_COORDS[c.w];
  return null;
}

var mapObj=null;
function pgMAP(){
  var tc=CMDS.filter(function(c){return c.dc===td()&&c.s!=="Annulee"&&c.s!=="Livree";});
  var total=tc.length;
  var h='<div class="shd"><b style="color:var(--b)">Carte des livraisons du jour ('+total+')</b></div>';
  if(!total){return h+'<div class="em">Aucune commande active aujourd\'hui</div>';}
  // Legend
  h+='<div class="map-legend">';
  LV.forEach(function(l,i){
    var cs=tc.filter(function(c){return c.lid===l.id;});
    if(!cs.length)return;
    h+='<div class="leg-item"><div class="leg-dot" style="background:'+DC[i%DC.length]+'"></div>'+l.n+' ('+cs.length+')</div>';
  });
  var unassigned=tc.filter(function(c){return !c.lid;});
  if(unassigned.length) h+='<div class="leg-item"><div class="leg-dot" style="background:#9E9E9E"></div>Non affectees ('+unassigned.length+')</div>';
  h+='</div>';
  h+='<div class="map-container" id="mapDiv"></div>';
  h+='<div style="font-size:11px;color:var(--mut);margin-top:.5rem;text-align:center">Positions approximatives par commune. Cliquez sur un marqueur pour les details.</div>';
  // Initialize map after DOM render
  setTimeout(function(){initMap(tc);},100);
  return h;
}

function initMap(cmds){
  var div=document.getElementById("mapDiv");
  if(!div||typeof google==="undefined")return;
  var depotLatLng={lat:36.685984,lng:2.89};
  var map=new google.maps.Map(div,{
    center:depotLatLng,zoom:11,
    mapTypeControl:false,streetViewControl:false,fullscreenControl:true
  });
  mapObj=map;
  // Depot marker
  new google.maps.Marker({
    position:depotLatLng,map:map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:"#1A1A3E",fillOpacity:1,strokeColor:"white",strokeWeight:2},
    title:"Depot ODELYS",
    label:{text:"D",color:"white",fontSize:"10px",fontWeight:"800"}
  }).addInfoWindow=function(){};
  var infoW=new google.maps.InfoWindow();
  var bounds=new google.maps.LatLngBounds();
  bounds.extend(depotLatLng);
  cmds.forEach(function(c){
    var coords=getCoords(c);
    if(!coords)return;
    var idx=LV.findIndex(function(l){return l.id===c.lid;});
    var col=c.lid?DC[idx<0?0:idx%DC.length]:"#9E9E9E";
    var lname2=c.lid?lname(c.lid):"Non affecte";
    var pos={lat:coords[0],lng:coords[1]};
    var marker=new google.maps.Marker({
      position:pos,map:map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:col,fillOpacity:1,strokeColor:"white",strokeWeight:2},
      label:{text:String(c.q),color:"white",fontSize:"10px",fontWeight:"800"},
      title:c.cn
    });
    marker.addListener("click",function(){
      infoW.setContent('<div style="font-size:13px;min-width:180px"><b>'+c.cn+'</b><br><span style="color:#7070A0">'+c.c+'</span><br><b style="color:#4A8010">'+c.q+'</b> bonbonnes<br><span style="color:'+col+'">'+lname2+'</span><br>'+stTag(c.s||"A programmer")+'</div>');
      infoW.open(map,marker);
    });
    bounds.extend(pos);
  });
  map.fitBounds(bounds,{top:40,bottom:40,left:40,right:40});
}

function gasSync(action, data){
  if(!GAS_URL)return;
  fetch(GAS_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:action,data:data})
  }).catch(function(){});// silent fail - sheets is backup only
}
function gasExportAll(){
  if(!GAS_URL){alert("Google Sheets non configure. Utilisez le bouton CSV pour exporter.");return;}
  gasSync("syncAll",{cmds:CMDS});
  alert("Synchronisation vers Google Sheets lancee !");
}

function exportCSV(){
  if(typeof XLSX==="undefined"){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=function(){_doExport();};
    document.head.appendChild(s);
  } else { _doExport(); }
}
function _doExport(){
  var date=new Date().toLocaleDateString("fr-FR").replace(/\//g,"-");
  var rows=[["N Commande","Date Commande","Date Livr. Prevue","Date Livr. Reelle",
    "Client","Wilaya","Commune","Adresse",
    "Bonb. Commandees","Bonb. Livrees","Vides Recuperes","N Bon BL",
    "Livreur","Statut","Priorite","Accessoires","Note","Observation Livreur"]];
  CMDS.forEach(function(c){
    rows.push([
      c.id||"",c.dc||"",c.dls||"",c.dl||"",
      c.cn||"",c.w||"",c.c||"",c.a||"",
      Number(c.q)||0,
      c.qr!==null&&c.qr!==""?Number(c.qr):Number(c.q)||0,
      Number(c.vi)||0,c.bl||"",
      c.lid?lname(c.lid):"",
      c.s||"",c.pri||"Normale",c.rem||"",c.note||"",c.obs||""
    ]);
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[
    {wch:12},{wch:12},{wch:14},{wch:14},
    {wch:35},{wch:12},{wch:14},{wch:42},
    {wch:10},{wch:10},{wch:10},{wch:12},
    {wch:14},{wch:12},{wch:10},{wch:20},{wch:25},{wch:25}
  ];
  // Style header row
  var range=XLSX.utils.decode_range(ws["!ref"]);
  for(var col=range.s.c;col<=range.e.c;col++){
    var cell=XLSX.utils.encode_cell({r:0,c:col});
    if(ws[cell]){
      ws[cell].s={font:{bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"3D3DB5"}}};
    }
  }
  XLSX.utils.book_append_sheet(wb,"COMMANDES",ws);
  XLSX.writeFile(wb,"ODELYS_Commandes_"+date+".xlsx");
}

function moveCmd(cid,lid,dir){
  var cs=livCmds(lid);
  var idx=cs.findIndex(function(x){return x.id===cid;});
  if(idx<0)return;
  var newIdx=idx+dir;
  if(newIdx<0||newIdx>=cs.length)return;
  // Assign order numbers
  cs.forEach(function(c,i){c.ord=i;});
  // Swap
  var tmp=cs[idx].ord;
  cs[idx].ord=cs[newIdx].ord;
  cs[newIdx].ord=tmp;
}

function pgPLAN(){
  var today=td();
  // All commands planned for today (dls=today OR dc=today and no dls) that are not cancelled
  var tc=CMDS.filter(function(c){
    if(c.s==="Annulee")return false;
    var dlsD=c.dls?parseDate(c.dls):null;
    var dcD=parseDate(c.dc);
    var todayD=parseDate(today);
    if(dlsD) return dlsD.getTime()===todayD.getTime();
    return dcD&&dcD.getTime()===todayD.getTime();
  });

  var livrees=tc.filter(function(c){return c.s==="Livree";});
  var nonLivrees=tc.filter(function(c){return c.s!=="Livree";});
  var totalCmd=tc.reduce(function(s,c){return s+(+c.q||0);},0);
  var totalLiv=livrees.reduce(function(s,c){return s+(+c.qr||+c.q||0);},0);
  var totalNonLiv=nonLivrees.reduce(function(s,c){return s+(+c.q||0);},0);
  var totalVides=tc.reduce(function(s,c){return s+(+c.vi||0);},0);
  var pct=tc.length?Math.round(livrees.length/tc.length*100):0;

  var h='<div class="shd"><b style="color:var(--b)">Planning du '+new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})+'</b></div>';

  if(!tc.length){
    return h+'<div class="em">Aucune commande planifiee pour aujourd\'hui</div>';
  }

  // ── Barre de progression ─────────────────────────
  h+='<div class="card" style="margin-bottom:.75rem">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<span style="font-weight:700;color:var(--b)">Avancement du jour</span>'
    +'<span style="font-size:18px;font-weight:900;color:'+(pct===100?'var(--gd)':'var(--b)')+'">'+pct+'%</span>'
    +'</div>'
    +'<div style="height:10px;background:var(--gray);border-radius:5px;overflow:hidden;margin-bottom:12px">'
    +'<div style="height:100%;background:linear-gradient(90deg,#72B81E,#3D3DB5);width:'+pct+'%;border-radius:5px;transition:width .5s"></div>'
    +'</div>'
    // Stats grid
    +'<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">'
    +'<div style="background:var(--bl);border-radius:10px;padding:10px 12px">'
    +'<div style="font-size:11px;color:var(--mut)">Bonb. commandées</div>'
    +'<div style="font-size:28px;font-weight:900;color:var(--b)">'+totalCmd+'</div>'
    +'<div style="font-size:10px;color:var(--mut)">'+tc.length+' clients</div>'
    +'</div>'
    +'<div style="background:var(--gl);border-radius:10px;padding:10px 12px">'
    +'<div style="font-size:11px;color:var(--mut)">Bonb. livrées</div>'
    +'<div style="font-size:28px;font-weight:900;color:var(--gd)">'+totalLiv+'</div>'
    +'<div style="font-size:10px;color:var(--mut)">'+livrees.length+' clients</div>'
    +'</div>'
    +'<div style="background:#FFEBEE;border-radius:10px;padding:10px 12px">'
    +'<div style="font-size:11px;color:var(--mut)">Bonb. restantes</div>'
    +'<div style="font-size:28px;font-weight:900;color:#C62828">'+totalNonLiv+'</div>'
    +'<div style="font-size:10px;color:#C62828">'+nonLivrees.length+' clients en attente</div>'
    +'</div>'
    +'<div style="background:#FFF8E1;border-radius:10px;padding:10px 12px">'
    +'<div style="font-size:11px;color:var(--mut)">Vides récupérés</div>'
    +'<div style="font-size:28px;font-weight:900;color:#854F0B">'+totalVides+'</div>'
    +'<div style="font-size:10px;color:var(--mut)">bonbonnes vides</div>'
    +'</div>'
    +'</div>'
    +'</div>';

  // ── Par livreur ──────────────────────────────────
  h+='<div class="card"><b style="color:var(--b);display:block;margin-bottom:10px">Par livreur</b>';
  LV.forEach(function(l,i){
    var lcs=tc.filter(function(c){return c.lid===l.id;});
    if(!lcs.length)return;
    var llv=lcs.filter(function(c){return c.s==="Livree";});
    var lq=lcs.reduce(function(s,c){return s+(+c.q||0);},0);
    var lqLiv=llv.reduce(function(s,c){return s+(+c.qr||+c.q||0);},0);
    var lpct=lcs.length?Math.round(llv.length/lcs.length*100):0;
    var col=DC[i%DC.length];
    h+='<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--bdr)">'
      +'<div style="width:32px;height:32px;border-radius:50%;background:'+col+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:white;flex-shrink:0">'+ini(l.n)+'</div>'
      +'<div style="flex:1"><div style="font-weight:700;color:'+col+'">'+l.n+'</div>'
      +'<div style="height:4px;background:var(--gray);border-radius:2px;margin-top:3px;overflow:hidden">'
      +'<div style="height:100%;background:'+col+';width:'+lpct+'%"></div></div></div>'
      +'<div style="text-align:right;font-size:12px">'
      +'<b style="color:var(--gd)">'+lqLiv+'</b><span style="color:var(--mut)">/'+lq+' bonb.</span><br>'
      +'<span style="color:var(--mut);font-size:10px">'+llv.length+'/'+lcs.length+' clients</span>'
      +'</div></div>';
  });
  h+='</div>';

  // ── Clients non encore livrés ────────────────────
  if(nonLivrees.length){
    h+='<div class="card"><b style="color:#C62828;display:block;margin-bottom:10px">Clients non encore livrés ('+nonLivrees.length+')</b>';
    nonLivrees.sort(function(a,b){
      var po={"Critique":0,"Importante":1,"Normale":2};
      return (po[a.pri||"Normale"]||0)-(po[b.pri||"Normale"]||0);
    });
    nonLivrees.forEach(function(c){
      var col=c.lid?lcolor(c.lid):"#9E9E9E";
      h+='<div class="or" style="margin-bottom:4px;border-left:3px solid '+col+'">'
        +'<div style="flex:1"><div style="font-weight:700;font-size:12px">'+c.cn+'</div>'
        +'<div style="font-size:10px;color:var(--mut)">'+c.c+' &mdash; '+c.w+'</div></div>'
        +'<b style="color:var(--gd)">'+c.q+'</b>'
        +priTag(c.pri||"Normale")
        +stTag(c.s||"A programmer")
        +'<span style="font-size:11px;font-weight:700;color:'+col+'">'+(c.lid?lname(c.lid):'<span style="color:#E53935">Non affecté</span>')+'</span>'
        +'</div>';
    });
    h+='</div>';
  } else {
    h+='<div class="al al-ok">🎉 Toutes les livraisons du jour sont terminées !</div>';
  }
  return h;
}


function delCmd(id){
  if(!confirm("Supprimer cette commande ?"))return;
  CMDS=CMDS.filter(function(c){return c.id!==id;});
  fbSave(render);
}
function clearAll(){
  if(!confirm("Effacer TOUTES les commandes ?\n\nCette action est irréversible."))return;
  if(!confirm("Confirmer : supprimer tout l'historique ?"))return;
  CMDS=[];N=1000;
  fbSave(render);
  alert("Toutes les commandes ont été supprimées.");
}
